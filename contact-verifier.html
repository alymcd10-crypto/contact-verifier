<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#faf8f5">
  <title>Contact Verifier · Realtor &amp; Lawyer Database</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --cream:#faf8f5; --warm:#f3ede4; --ink:#2a2218; --muted:#7a7060;
      --navy:#1b2b4b; --gold:#b8932f; --green:#2d7a4f; --red:#c0392b;
      --amber:#d4851a; --blue:#2563eb; --rule:rgba(42,34,24,.1);
      --radius:10px; --shadow:0 2px 16px rgba(42,34,24,.08);
    }
    html,body { height:100%; background:var(--cream); }
    body { font-family:'Sora',sans-serif; color:var(--ink); }
    #root { min-height:100vh; }
    button,input,select,textarea { font-family:'Sora',sans-serif; }
    input:focus,select:focus,textarea:focus { outline:none; }

    @keyframes si   { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes spin { to{transform:rotate(360deg)} }
    @keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:.45} }
    .si   { animation:si   .38s cubic-bezier(.16,1,.3,1) both; }
    .spin { animation:spin 1s linear infinite; display:inline-block; }
    .pulse{ animation:pulse 1.6s ease-in-out infinite; }

    .app { min-height:100vh; display:flex; flex-direction:column; }
    .topbar { background:var(--navy); color:#fff; padding:14px 24px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .topbar-brand { font-family:'DM Serif Display',serif; font-size:1.3rem; display:flex; align-items:center; gap:10px; }
    .topbar-sub { font-size:.72rem; opacity:.5; letter-spacing:.15em; text-transform:uppercase; }
    .topbar-right { display:flex; align-items:center; gap:12px; }
    .main { flex:1; max-width:1300px; margin:0 auto; width:100%; padding:28px 20px 60px; }

    .card { background:#fff; border:1px solid var(--rule); border-radius:var(--radius); box-shadow:var(--shadow); padding:24px; margin-bottom:20px; }
    .card-title { font-family:'DM Serif Display',serif; font-size:1.15rem; color:var(--navy); margin-bottom:16px; display:flex; align-items:center; gap:8px; }

    .btn { display:inline-flex; align-items:center; gap:7px; padding:9px 18px; border-radius:6px; font-size:.82rem; font-weight:600; letter-spacing:.03em; cursor:pointer; border:none; transition:all .18s; }
    .btn-primary { background:var(--navy); color:#fff; }
    .btn-primary:hover { background:#253860; }
    .btn-success { background:var(--green); color:#fff; }
    .btn-danger  { background:var(--red); color:#fff; }
    .btn-ghost   { background:transparent; color:var(--muted); border:1px solid var(--rule); }
    .btn-ghost:hover   { border-color:#aaa; color:var(--ink); }
    .btn-gold    { background:var(--gold); color:#fff; }
    .btn:disabled { opacity:.45; cursor:not-allowed; }

    .upload-zone { border:2px dashed var(--rule); border-radius:var(--radius); padding:36px 24px; text-align:center; cursor:pointer; transition:all .18s; background:var(--cream); }
    .upload-zone:hover,.upload-zone.dragover { border-color:var(--navy); background:var(--warm); }
    .upload-title { font-weight:600; font-size:.95rem; margin-bottom:4px; }
    .upload-hint  { font-size:.8rem; color:var(--muted); }

    .stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:14px; margin-bottom:20px; }
    .stat-box  { background:#fff; border:1px solid var(--rule); border-radius:var(--radius); padding:16px 18px; text-align:center; }
    .stat-num  { font-family:'DM Serif Display',serif; font-size:2rem; color:var(--navy); line-height:1; }
    .stat-lbl  { font-size:.7rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-top:4px; }
    .stat-box.green .stat-num { color:var(--green); }
    .stat-box.amber .stat-num { color:var(--amber); }
    .stat-box.red   .stat-num { color:var(--red); }
    .stat-box.blue  .stat-num { color:var(--blue); }

    .prog-bar-wrap { background:var(--warm); border-radius:999px; height:8px; overflow:hidden; margin:10px 0; }
    .prog-bar      { height:100%; background:var(--navy); border-radius:999px; transition:width .3s; }

    .filter-row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:16px; }
    .filter-row input,.filter-row select { padding:8px 12px; border:1px solid var(--rule); border-radius:6px; font-size:.82rem; background:var(--cream); color:var(--ink); min-width:160px; }

    .tbl-wrap { overflow-x:auto; border-radius:var(--radius); border:1px solid var(--rule); }
    table { width:100%; border-collapse:collapse; font-size:.82rem; }
    th { background:var(--warm); padding:10px 14px; text-align:left; font-size:.7rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); border-bottom:1px solid var(--rule); white-space:nowrap; }
    td { padding:10px 14px; border-bottom:1px solid var(--rule); vertical-align:middle; }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:var(--warm); cursor:pointer; }
    .td-name { font-weight:600; color:var(--navy); }
    .td-type { font-size:.72rem; letter-spacing:.08em; text-transform:uppercase; padding:2px 8px; border-radius:4px; font-weight:600; display:inline-block; }
    .td-type.realtor { background:#e8f0fe; color:#1d4ed8; }
    .td-type.lawyer  { background:#fef3c7; color:#92400e; }
    .td-muted { color:var(--muted); }

    .status-badge { display:inline-flex; align-items:center; gap:5px; font-size:.72rem; font-weight:600; padding:3px 10px; border-radius:999px; white-space:nowrap; }
    .status-badge.verified { background:#d1fae5; color:#065f46; }
    .status-badge.partial  { background:#fff7ed; color:#9a3412; }
    .status-badge.changed  { background:#f3e8ff; color:#6b21a8; }
    .status-badge.not-found{ background:#fee2e2; color:#991b1b; }
    .status-badge.pending  { background:#f3f4f6; color:#6b7280; }
    .status-badge.error    { background:#fee2e2; color:#991b1b; }

    .photo-cell { width:40px; height:40px; border-radius:50%; overflow:hidden; border:2px solid var(--rule); background:var(--warm); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.85rem; color:var(--muted); flex-shrink:0; }
    .photo-cell img { width:100%; height:100%; object-fit:cover; }

    .detail-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:100; display:flex; align-items:center; justify-content:center; padding:24px; }
    .detail-panel { background:#fff; border-radius:var(--radius); width:100%; max-width:720px; max-height:90vh; overflow-y:auto; padding:28px 24px; }
    .detail-head { display:flex; align-items:center; gap:16px; margin-bottom:20px; }
    .detail-photo { width:72px; height:72px; border-radius:50%; overflow:hidden; border:3px solid var(--rule); background:var(--warm); display:flex; align-items:center; justify-content:center; font-size:1.6rem; font-weight:700; color:var(--muted); flex-shrink:0; }
    .detail-photo img { width:100%; height:100%; object-fit:cover; }
    .detail-name { font-family:'DM Serif Display',serif; font-size:1.4rem; color:var(--navy); }
    .detail-role { font-size:.8rem; color:var(--muted); margin-top:2px; }

    .compare-grid { display:grid; grid-template-columns:160px 1fr 1fr 110px; gap:8px 14px; font-size:.83rem; align-items:baseline; }
    .compare-grid .cg-h { font-size:.68rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); padding-bottom:6px; border-bottom:1px solid var(--rule); }
    .compare-grid .cg-row { display:contents; }
    .compare-grid .cg-field { font-weight:600; color:var(--muted); text-transform:uppercase; font-size:.7rem; letter-spacing:.1em; padding:8px 0; border-bottom:1px dashed var(--rule); }
    .compare-grid .cg-val  { padding:8px 0; border-bottom:1px dashed var(--rule); word-break:break-word; }
    .compare-grid .cg-val.updated { color:var(--green); font-weight:600; }
    .compare-grid .cg-val.review  { color:var(--amber); }
    .compare-grid .cg-val.same    { color:var(--muted); }
    .compare-grid .cg-conf { padding:8px 0; border-bottom:1px dashed var(--rule); font-size:.75rem; color:var(--muted); }

    .src-tag { display:inline-flex; align-items:center; font-size:.68rem; padding:2px 8px; border-radius:4px; background:#e0e7ff; color:#3730a3; font-weight:600; margin-right:4px; }

    .toast { position:fixed; bottom:24px; right:24px; background:var(--navy); color:#fff; padding:12px 18px; border-radius:8px; font-size:.84rem; font-weight:500; z-index:999; max-width:360px; box-shadow:0 4px 20px rgba(0,0,0,.25); animation:si .3s both; }
    .toast.success { background:var(--green); }
    .toast.error   { background:var(--red); }

    .wiz-field { margin-bottom:14px; }
    .wiz-field label { display:block; font-size:.72rem; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
    .wiz-field input { width:100%; padding:11px 14px; border:1px solid var(--rule); border-radius:6px; font-size:.9rem; background:var(--cream); color:var(--ink); }
    .wiz-field input:focus { border-color:var(--navy); }

    .src-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; }
    .src-dot.on { background:var(--green); }
    .src-dot.off { background:#cbc5ba; }

    .alert { padding:12px 14px; border-radius:6px; font-size:.82rem; margin-bottom:14px; }
    .alert-warn { background:#fff7ed; color:#9a3412; border:1px solid #fed7aa; }
    .alert-err  { background:#fee2e2; color:#991b1b; border:1px solid #fca5a5; }
    .alert-ok   { background:#d1fae5; color:#065f46; border:1px solid #6ee7b7; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
