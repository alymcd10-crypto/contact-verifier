version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
      POSTGRES_DB: crm
    ports:
      - "5432:5432"
    volumes:
      - crm_pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DB_URL: postgresql://crm:crm@db:5432/crm
      CORS_ORIGINS: "*"
      # TWILIO_ACCOUNT_SID: (set these to go live with SMS)
      # TWILIO_AUTH_TOKEN:
      # TWILIO_PHONE_NUMBER:
    depends_on:
      - db

volumes:
  crm_pgdata:
